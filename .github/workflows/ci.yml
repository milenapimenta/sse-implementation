name: Continuous Integration and Deployment

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  continuous-integration:
    name: Lint, Typecheck, Tests and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: test
      LOG_LEVEL: silent
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notifications_test
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notifications_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U postgres -d notifications_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL and Redis
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 30); do
            if docker exec "${{ job.services.postgres.id }}" \
              pg_isready -U postgres -d notifications_test; then
              break
            fi

            if [ "${attempt}" -eq 30 ]; then
              echo "PostgreSQL did not become healthy in time"
              exit 1
            fi

            sleep 1
          done

          for attempt in $(seq 1 30); do
            if docker exec "${{ job.services.redis.id }}" \
              redis-cli ping | grep -q PONG; then
              break
            fi

            if [ "${attempt}" -eq 30 ]; then
              echo "Redis did not become healthy in time"
              exit 1
            fi

            sleep 1
          done

      - name: Run lint
        run: npm run lint

      - name: Check TypeScript
        run: npm run typecheck

      - name: Prepare test database
        run: npm run db:migrate:test

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Build application
        run: npm run build

  continuous-deployment:
    name: Build images and deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    needs:
      - continuous-integration

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    permissions:
      contents: read
      id-token: write

    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API and frontend images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          echo "Building API..."

          docker build \
            --tag "${IMAGE_URI}:api-${IMAGE_TAG}" \
            --tag "${IMAGE_URI}:api-latest" \
            .

          echo "Building frontend..."

          docker build \
            --build-arg VITE_API_URL= \
            --tag "${IMAGE_URI}:frontend-${IMAGE_TAG}" \
            --tag "${IMAGE_URI}:frontend-latest" \
            ./frontend

          echo "Pushing API..."

          docker push "${IMAGE_URI}:api-${IMAGE_TAG}"
          docker push "${IMAGE_URI}:api-latest"

          echo "Pushing frontend..."

          docker push "${IMAGE_URI}:frontend-${IMAGE_TAG}"
          docker push "${IMAGE_URI}:frontend-latest"

      - name: Deploy on EC2 through Systems Manager
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          PARAMETERS=$(jq -cn \
            --arg command "sudo /opt/sse-project/deploy.sh ${IMAGE_TAG}" \
            '{commands: [$command]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy commit ${IMAGE_TAG}" \
            --parameters "${PARAMETERS}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: ${COMMAND_ID}"

          STATUS="Pending"

          for attempt in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Deploy status: ${STATUS}"

            case "${STATUS}" in
              Success)
                break
                ;;

              Failed|Cancelled|TimedOut|Cancelling)
                break
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query '{
              Status: Status,
              Output: StandardOutputContent,
              Error: StandardErrorContent
            }'

          if [ "${STATUS}" != "Success" ]; then
            echo "O deploy falhou com status: ${STATUS}"
            exit 1
          fi