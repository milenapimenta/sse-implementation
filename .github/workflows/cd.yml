name: Continuous Deployment

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}

  ECR_API_REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}
  ECR_FRONTEND_REPOSITORY: ${{ vars.ECR_FRONTEND_REPOSITORY }}

  SSM_PARAMETER_NAME: ${{ vars.SSM_PARAMETER_NAME }}

jobs:
  deployment-guard:
    name: Decide whether deployment should run
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      deploy_sha: ${{ steps.decision.outputs.deploy_sha }}
      should_deploy: ${{ steps.decision.outputs.should_deploy }}

    steps:
      - name: Decide deployment eligibility
        id: decision
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SHA: ${{ github.sha }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          should_deploy=false
          deploy_sha="${MANUAL_SHA}"
          reason="Manual deployment requested."

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            deploy_sha="${WORKFLOW_RUN_SHA}"

            if [[ "${WORKFLOW_RUN_CONCLUSION}" != "success" ]]; then
              reason="CI did not finish successfully."
            elif [[ "${WORKFLOW_RUN_EVENT}" != "push" ]]; then
              reason="CI was not triggered by a push."
            elif [[ "${WORKFLOW_RUN_BRANCH}" != "main" ]]; then
              reason="CI did not run for main."
            else
              latest_sha="$(
                curl \
                  --fail \
                  --silent \
                  --show-error \
                  --header "Authorization: Bearer ${GITHUB_TOKEN}" \
                  --header "Accept: application/vnd.github+json" \
                  "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" |
                  jq --raw-output '.object.sha'
              )"

              if [[ "${deploy_sha}" == "${latest_sha}" ]]; then
                should_deploy=true
                reason="CI passed for the latest main revision."
              else
                reason="Skipping stale revision ${deploy_sha}; latest main is ${latest_sha}."
              fi
            fi
          else
            should_deploy=true
          fi

          echo "deploy_sha=${deploy_sha}" >> "${GITHUB_OUTPUT}"
          echo "should_deploy=${should_deploy}" >> "${GITHUB_OUTPUT}"
          echo "${reason}"

  deploy:
    name: Build images and deploy to EC2
    needs: deployment-guard
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: ${{ needs.deployment-guard.outputs.should_deploy == 'true' }}

    steps:
      - name: Checkout approved revision
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.deployment-guard.outputs.deploy_sha }}

      - name: Identify revision
        id: revision
        shell: bash
        run: |
          set -Eeuo pipefail

          REVISION="$(git rev-parse HEAD)"

          echo "sha=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "Deploying revision: ${REVISION}"

      - name: Validate required configuration
        shell: bash
        run: |
          set -Eeuo pipefail

          : "${AWS_REGION:?Configure a variável AWS_REGION}"
          : "${AWS_ACCOUNT_ID:?Configure a variável AWS_ACCOUNT_ID}"
          : "${EC2_INSTANCE_ID:?Configure a variável EC2_INSTANCE_ID}"
          : "${ECR_API_REPOSITORY:?Configure ECR_API_REPOSITORY}"
          : "${ECR_FRONTEND_REPOSITORY:?Configure ECR_FRONTEND_REPOSITORY}"
          : "${SSM_PARAMETER_NAME:?Configure SSM_PARAMETER_NAME}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}
          mask-aws-account-id: true

      - name: Validate AWS identity
        shell: bash
        run: |
          set -Eeuo pipefail
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define image names
        id: images
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.revision.outputs.sha }}
        run: |
          set -Eeuo pipefail

          API_IMAGE_BASE="${ECR_REGISTRY}/${ECR_API_REPOSITORY}"
          FRONTEND_IMAGE_BASE="${ECR_REGISTRY}/${ECR_FRONTEND_REPOSITORY}"

          echo "api_image=${API_IMAGE_BASE}:${IMAGE_TAG}" \
            >> "${GITHUB_OUTPUT}"

          echo "api_latest=${API_IMAGE_BASE}:latest" \
            >> "${GITHUB_OUTPUT}"

          echo "frontend_image=${FRONTEND_IMAGE_BASE}:${IMAGE_TAG}" \
            >> "${GITHUB_OUTPUT}"

          echo "frontend_latest=${FRONTEND_IMAGE_BASE}:latest" \
            >> "${GITHUB_OUTPUT}"

          echo "API image: ${API_IMAGE_BASE}:${IMAGE_TAG}"
          echo "Frontend image: ${FRONTEND_IMAGE_BASE}:${IMAGE_TAG}"

      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true

          tags: |
            ${{ steps.images.outputs.api_image }}
            ${{ steps.images.outputs.api_latest }}

          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

          provenance: true
          sbom: true

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true

          build-args: |
            VITE_API_URL=

          tags: |
            ${{ steps.images.outputs.frontend_image }}
            ${{ steps.images.outputs.frontend_latest }}

          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

          provenance: true
          sbom: true

      - name: Prepare Systems Manager command
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.revision.outputs.sha }}
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f docker-compose.production.yml
          test -f deploy/deploy.sh

          python3 <<'PY'
          import base64
          import json
          import os
          import shlex
          from pathlib import Path

          deploy_directory = "/opt/estudo-sse"

          compose_content = Path(
              "docker-compose.production.yml"
          ).read_bytes()

          deploy_script_content = Path(
              "deploy/deploy.sh"
          ).read_bytes()

          compose_base64 = base64.b64encode(
              compose_content
          ).decode("ascii")

          deploy_script_base64 = base64.b64encode(
              deploy_script_content
          ).decode("ascii")

          quote = shlex.quote

          aws_region = os.environ["AWS_REGION"]
          ecr_registry = os.environ["ECR_REGISTRY"]
          api_repository = os.environ["ECR_API_REPOSITORY"]
          frontend_repository = os.environ[
              "ECR_FRONTEND_REPOSITORY"
          ]
          image_tag = os.environ["IMAGE_TAG"]
          parameter_name = os.environ["SSM_PARAMETER_NAME"]

          compose_path = (
              deploy_directory
              + "/docker-compose.production.yml"
          )

          deploy_script_path = (
              deploy_directory
              + "/deploy.sh"
          )

          commands = [
              "set -Eeuo pipefail",

              (
                  f"install -d -m 0700 "
                  f"{quote(deploy_directory)}"
              ),

              (
                  f"printf '%s' {quote(compose_base64)} "
                  f"| base64 --decode "
                  f"> {quote(compose_path)}"
              ),

              (
                  f"printf '%s' {quote(deploy_script_base64)} "
                  f"| base64 --decode "
                  f"> {quote(deploy_script_path)}"
              ),

              (
                  f"chmod 0600 "
                  f"{quote(compose_path)}"
              ),

              (
                  f"chmod 0700 "
                  f"{quote(deploy_script_path)}"
              ),

              (
                  f"AWS_REGION={quote(aws_region)} "
                  f"ECR_REGISTRY={quote(ecr_registry)} "
                  f"ECR_API_REPOSITORY={quote(api_repository)} "
                  f"ECR_FRONTEND_REPOSITORY="
                  f"{quote(frontend_repository)} "
                  f"IMAGE_TAG={quote(image_tag)} "
                  f"SSM_PARAMETER_NAME={quote(parameter_name)} "
                  f"{quote(deploy_script_path)}"
              ),
          ]

          Path("ssm-commands.json").write_text(
              json.dumps({"commands": commands}),
              encoding="utf-8",
          )
          PY

          jq empty ssm-commands.json

      - name: Deploy through Systems Manager
        id: deploy
        shell: bash
        run: |
          set -Eeuo pipefail

          COMMAND_ID="$(
            aws ssm send-command \
              --region "${AWS_REGION}" \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ${GITHUB_REPOSITORY}@${{ steps.revision.outputs.sha }}" \
              --parameters file://ssm-commands.json \
              --timeout-seconds 1200 \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command_id=${COMMAND_ID}" \
            >> "${GITHUB_OUTPUT}"

          echo "SSM command ID: ${COMMAND_ID}"

          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}"

      - name: Show deployment result
        if: always() && steps.deploy.outputs.command_id != ''
        shell: bash
        run: |
          set -Eeuo pipefail

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query '{
              Status: Status,
              Output: StandardOutputContent,
              Error: StandardErrorContent
            }'
