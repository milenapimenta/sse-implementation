<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notificacoes SSE</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f8;
        --panel: #ffffff;
        --text: #172026;
        --muted: #5d6b73;
        --line: #d9e1e5;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --ok: #13803d;
        --warn: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font:
          15px/1.45 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2.5vw, 2.25rem);
        letter-spacing: 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        white-space: nowrap;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
      }

      .dot.connected {
        background: var(--ok);
      }

      .dot.error {
        background: var(--danger);
      }

      .grid {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 16px;
        align-items: start;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel {
        padding: 16px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 1rem;
        letter-spacing: 0;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      input,
      textarea {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        color: var(--text);
        font: inherit;
        background: #fff;
      }

      textarea {
        resize: vertical;
        min-height: 84px;
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 13px;
        color: #fff;
        background: var(--accent);
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        color: var(--text);
        background: #fff;
        border-color: var(--line);
      }

      button.secondary:hover {
        background: #f0f4f5;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .events {
        display: grid;
        gap: 10px;
        max-height: 640px;
        overflow: auto;
        padding: 16px;
      }

      .event {
        border: 1px solid var(--line);
        border-left: 4px solid var(--accent);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
      }

      .event.meta {
        border-left-color: var(--warn);
      }

      .event.error {
        border-left-color: var(--danger);
      }

      .event strong {
        display: block;
        margin-bottom: 4px;
      }

      .event small {
        color: var(--muted);
        word-break: break-word;
      }

      pre {
        margin: 8px 0 0;
        overflow: auto;
        color: var(--muted);
        white-space: pre-wrap;
      }

      @media (max-width: 840px) {
        header,
        .grid {
          grid-template-columns: 1fr;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Notificacoes SSE</h1>
        <div class="status">
          <span id="status-dot" class="dot"></span>
          <span id="status-text">desconectado</span>
        </div>
      </header>

      <div class="grid">
        <section class="panel">
          <h2>Stream</h2>
          <label>
            Usuario
            <input id="user-id" value="user-123" autocomplete="off" />
          </label>
          <div class="row">
            <button id="connect">Conectar</button>
            <button id="disconnect" class="secondary" disabled>Desconectar</button>
          </div>

          <hr />

          <h2>Nova notificacao</h2>
          <label>
            Destinatario
            <input id="target-user-id" value="user-123" autocomplete="off" />
          </label>
          <label>
            Tipo
            <input id="type" value="message" autocomplete="off" />
          </label>
          <label>
            Titulo
            <input id="title" value="Nova mensagem" autocomplete="off" />
          </label>
          <label>
            Mensagem
            <textarea id="message">Voce recebeu uma nova mensagem.</textarea>
          </label>
          <button id="send">Enviar notificacao</button>
        </section>

        <section>
          <div id="events" class="events"></div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        eventSource: null,
        seenIds: new Set(),
        reconnects: 0
      };

      const els = {
        statusDot: document.querySelector("#status-dot"),
        statusText: document.querySelector("#status-text"),
        userId: document.querySelector("#user-id"),
        targetUserId: document.querySelector("#target-user-id"),
        type: document.querySelector("#type"),
        title: document.querySelector("#title"),
        message: document.querySelector("#message"),
        connect: document.querySelector("#connect"),
        disconnect: document.querySelector("#disconnect"),
        send: document.querySelector("#send"),
        events: document.querySelector("#events")
      };

      function setStatus(status, tone) {
        els.statusText.textContent = status;
        els.statusDot.className = `dot ${tone || ""}`;
      }

      function addEvent(kind, title, detail) {
        const item = document.createElement("article");
        item.className = `event ${kind || ""}`;
        item.innerHTML = `
          <strong></strong>
          <small>${new Date().toLocaleTimeString()}</small>
          <pre></pre>
        `;
        item.querySelector("strong").textContent = title;
        item.querySelector("pre").textContent =
          typeof detail === "string" ? detail : JSON.stringify(detail, null, 2);
        els.events.prepend(item);
      }

      function connect() {
        const userId = els.userId.value.trim();

        if (!userId || state.eventSource) {
          return;
        }

        const url = `/api/notifications/stream?userId=${encodeURIComponent(userId)}`;
        const source = new EventSource(url);
        state.eventSource = source;

        els.connect.disabled = true;
        els.disconnect.disabled = false;
        setStatus("conectando", "");

        source.onopen = () => {
          setStatus(`conectado como ${userId}`, "connected");
        };

        source.addEventListener("connected", (event) => {
          addEvent("meta", "connected", JSON.parse(event.data));
        });

        source.addEventListener("notification", (event) => {
          if (event.lastEventId && state.seenIds.has(event.lastEventId)) {
            addEvent("meta", "duplicado ignorado", { id: event.lastEventId });
            return;
          }

          if (event.lastEventId) {
            state.seenIds.add(event.lastEventId);
          }

          addEvent("", "notification", JSON.parse(event.data));
        });

        source.addEventListener("ping", (event) => {
          addEvent("meta", "ping", JSON.parse(event.data));
        });

        source.addEventListener("shutdown", (event) => {
          addEvent("meta", "shutdown", JSON.parse(event.data));
        });

        source.onerror = () => {
          state.reconnects += 1;
          setStatus(`reconectando (${state.reconnects})`, "error");
          addEvent("error", "erro/reconexao", {
            reconnects: state.reconnects,
            readyState: source.readyState
          });
        };
      }

      function disconnect() {
        if (!state.eventSource) {
          return;
        }

        state.eventSource.close();
        state.eventSource = null;
        els.connect.disabled = false;
        els.disconnect.disabled = true;
        setStatus("desconectado", "");
        addEvent("meta", "desconectado", {});
      }

      async function sendNotification() {
        const payload = {
          userId: els.targetUserId.value.trim(),
          type: els.type.value.trim(),
          title: els.title.value.trim(),
          message: els.message.value.trim()
        };

        const response = await fetch("/api/notifications", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const body = await response.json();

        if (!response.ok) {
          addEvent("error", "falha ao criar", body);
          return;
        }

        addEvent("meta", "criada", body);
      }

      els.connect.addEventListener("click", connect);
      els.disconnect.addEventListener("click", disconnect);
      els.send.addEventListener("click", () => {
        sendNotification().catch((error) => {
          addEvent("error", "falha ao enviar", String(error));
        });
      });
    </script>
  </body>
</html>
