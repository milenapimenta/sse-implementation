name: Continuous Integration

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API - Lint, Typecheck, Tests and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      NODE_ENV: test
      LOG_LEVEL: silent
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/notifications_test
      REDIS_URL: redis://localhost:6379

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notifications_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U postgres -d notifications_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 5s

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 5s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 30); do
            if docker exec "${{ job.services.postgres.id }}" \
              pg_isready \
                --username postgres \
                --dbname notifications_test
            then
              echo "PostgreSQL is ready."
              exit 0
            fi

            echo "Waiting for PostgreSQL: attempt ${attempt}/30"
            sleep 1
          done

          echo "PostgreSQL did not become ready in time."
          docker logs "${{ job.services.postgres.id }}" || true
          exit 1

      - name: Wait for Redis
        shell: bash
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 30); do
            if docker exec "${{ job.services.redis.id }}" \
              redis-cli ping |
              grep --quiet PONG
            then
              echo "Redis is ready."
              exit 0
            fi

            echo "Waiting for Redis: attempt ${attempt}/30"
            sleep 1
          done

          echo "Redis did not become ready in time."
          docker logs "${{ job.services.redis.id }}" || true
          exit 1

      - name: Run API lint
        run: npm run lint

      - name: Check API TypeScript
        run: npm run typecheck

      - name: Prepare test database
        run: npm run db:migrate:test

      - name: Run API unit tests
        run: npm run test:unit

      - name: Run API integration tests
        run: npm run test:integration

      - name: Build API
        run: npm run build

  frontend:
    name: Frontend - Checks and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    env:
      CI: true
      VITE_API_URL: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run --if-present lint

      - name: Check frontend TypeScript
        run: npm run --if-present typecheck

      - name: Run frontend unit tests
        run: npm run --if-present test:unit

      - name: Build frontend
        run: npm run build